name: Build EPUB

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/build_epub.py'
      - '.github/workflows/epub.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/build_epub.py'
      - '.github/workflows/epub.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  epub:
    name: Generate EPUB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install EPUB builder dependency
        run: python -m pip install --disable-pip-version-check 'mistune>=3.0,<4'

      - name: Build EPUB
        run: python scripts/build_epub.py --output dist/The-Mythical-Man-Month-zh.epub

      - name: Upload EPUB artifact
        uses: actions/upload-artifact@v4
        with:
          name: The-Mythical-Man-Month-zh-epub
          path: dist/The-Mythical-Man-Month-zh.epub
          if-no-files-found: error
          retention-days: 90
